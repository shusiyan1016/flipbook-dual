<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,minimum-scale=1.0,maximum-scale=1.0,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>显隐之间 · 设计的设计</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#e8ddd0}

/* Loading */
#load{position:fixed;inset:0;z-index:99999;display:flex;flex-direction:column;align-items:center;justify-content:center;background:#1a1a1a;color:#fff;transition:opacity 1s,visibility 1s}
#load.hide{opacity:0;visibility:hidden;pointer-events:none}
.ph{width:52px;height:88px;border:2.5px solid rgba(255,255,255,.55);border-radius:9px;position:relative;margin-bottom:22px;animation:rotP 2.6s ease-in-out infinite}
.ph::after{content:'';position:absolute;top:4px;left:4px;right:4px;bottom:14px;background:linear-gradient(135deg,#333,#555);border-radius:3px}
.ph::before{content:'';position:absolute;bottom:3px;left:50%;transform:translateX(-50%);width:12px;height:3px;border:1.5px solid rgba(255,255,255,.35);border-radius:2px}
@keyframes rotP{0%{transform:rotate(0)}50%{transform:rotate(90deg)}70%{transform:rotate(90deg)}100%{transform:rotate(90deg)}}
.lt{font-size:14px;color:rgba(255,255,255,.55);letter-spacing:4px;animation:fp 1.5s infinite}
@keyframes fp{0%,100%{opacity:.35}50%{opacity:1}}

/* 背景层 */
#bg-layer{position:fixed;inset:0;z-index:0;background-color:#e8ddd0;transition:background-color 1.2s ease}

/* 过渡遮罩（粒子渐变） */
#transition-overlay{
  position:fixed;inset:0;z-index:4;
  pointer-events:none;
  opacity:0;
  transition:opacity 0.5s ease;
  background-color:#e8ddd0;
  background-image:
    radial-gradient(circle at 15% 50%, rgba(106,106,106,0.35) 0%, transparent 45%),
    radial-gradient(circle at 85% 50%, rgba(106,106,106,0.25) 0%, transparent 40%),
    radial-gradient(circle at 50% 30%, rgba(106,106,106,0.15) 0%, transparent 35%),
    radial-gradient(circle at 30% 70%, rgba(106,106,106,0.20) 0%, transparent 30%),
    radial-gradient(circle at 70% 70%, rgba(106,106,106,0.10) 0%, transparent 25%);
  background-size:200% 200%;
  background-position:0% 0%;
}
#transition-overlay.show{
  opacity:1;
  background-position:100% 100%;
  transition:opacity 0.3s ease, background-position 0.8s ease;
}
#transition-overlay.to-gray{
  background-color:#6a6a6a;
  background-image:
    radial-gradient(circle at 15% 50%, rgba(232,221,208,0.35) 0%, transparent 45%),
    radial-gradient(circle at 85% 50%, rgba(232,221,208,0.25) 0%, transparent 40%),
    radial-gradient(circle at 50% 30%, rgba(232,221,208,0.15) 0%, transparent 35%),
    radial-gradient(circle at 30% 70%, rgba(232,221,208,0.20) 0%, transparent 30%),
    radial-gradient(circle at 70% 70%, rgba(232,221,208,0.10) 0%, transparent 25%);
}
#transition-overlay.to-warm{
  background-color:#e8ddd0;
  background-image:
    radial-gradient(circle at 15% 50%, rgba(106,106,106,0.35) 0%, transparent 45%),
    radial-gradient(circle at 85% 50%, rgba(106,106,106,0.25) 0%, transparent 40%),
    radial-gradient(circle at 50% 30%, rgba(106,106,106,0.15) 0%, transparent 35%),
    radial-gradient(circle at 30% 70%, rgba(106,106,106,0.20) 0%, transparent 30%),
    radial-gradient(circle at 70% 70%, rgba(106,106,106,0.10) 0%, transparent 25%);
}

/* iframe 加上淡入淡出过渡 */
#iframe-donald,#iframe-kenya{
  position:fixed;top:0;left:0;width:100%;height:100%;border:none;
  z-index:1;
  opacity:1;
  transition:opacity 0.8s ease;
}
#iframe-donald{visibility:visible;z-index:2;opacity:1;}
#iframe-donald.hidden{opacity:0;visibility:visible;pointer-events:none;}
#iframe-kenya{visibility:hidden;z-index:1;opacity:0;pointer-events:none;}
#iframe-kenya.active{visibility:visible;z-index:3;opacity:1;pointer-events:auto;}
</style>
</head>
<body>

<div id="bg-layer"></div>
<div id="transition-overlay"></div>
<div id="load"><div class="ph"></div><div class="lt">请横屏观看</div></div>

<iframe id="iframe-donald" src="./donald/index.html"></iframe>
<iframe id="iframe-kenya" src="./kenya/index.html"></iframe>

<script>
var MODE_A = 0, MODE_B = 1;
var currentMode = MODE_A;
var A_LAST = 13, B_LAST = 16, B_FIRST = 1;
var busy = false;

function getWin(id) {
  try { return document.getElementById(id).contentWindow; } catch(e) { return null; }
}

// 显示过渡遮罩（粒子动效）
function showOverlay(toGray) {
  var o = document.getElementById('transition-overlay');
  o.className = 'show' + (toGray ? ' to-gray' : ' to-warm');
}

function hideOverlay() {
  document.getElementById('transition-overlay').className = '';
}

function switchTo(mode, page) {
  if (busy) return;
  busy = true;
  
  var toGray = (mode === MODE_B);
  showOverlay(toGray);
  
  // 遮罩完全盖住后切换
  setTimeout(function() {
    if (mode === MODE_A) {
      document.getElementById('iframe-donald').classList.remove('hidden');
      document.getElementById('iframe-kenya').classList.remove('active');
      document.getElementById('bg-layer').style.backgroundColor = '#e8ddd0';
      currentMode = MODE_A;
      setTimeout(function(){
        var w = getWin('iframe-donald');
        if(w && w.BookInfo) try { w.BookInfo.getBook().gotoPage(page); } catch(e){}
      },200);
    } else {
      document.getElementById('iframe-kenya').classList.add('active');
      document.getElementById('iframe-donald').classList.add('hidden');
      document.getElementById('bg-layer').style.backgroundColor = '#6a6a6a';
      currentMode = MODE_B;
      setTimeout(function(){
        var w = getWin('iframe-kenya');
        if(w && w.BookInfo) try { w.BookInfo.getBook().gotoPage(page); } catch(e){}
      },200);
    }
    
    // 遮罩淡出
    setTimeout(function() {
      hideOverlay();
    }, 500);
  }, 350);
  
  setTimeout(function(){busy=false;}, 1200);
}

// 边界拦截
function install() {
  [
    {fid:'iframe-donald', mode:MODE_A, last:A_LAST, nM:MODE_B, nP:B_FIRST, pP:B_LAST},
    {fid:'iframe-kenya',  mode:MODE_B, last:B_LAST, nM:MODE_A, nP:1,       pP:A_LAST}
  ].forEach(function(c){
    (function trySetup(){
      var w = getWin(c.fid);
      if(!w || !w.document || !w.BookInfo) { setTimeout(trySetup,400); return; }
      var h = function(e) {
        if(currentMode !== c.mode || busy) return;
        var x = e.clientX; if(x===void 0 && e.touches) x=e.touches[0].clientX;
        if(x===void 0) return;
        try {
          var p = w.BookInfo.getCurrentPages();
          if(!p||!p.length) return;
          var mx=Math.max.apply(null,p), mn=Math.min.apply(null,p);
          var r = x > (w.innerWidth||document.documentElement.clientWidth)*0.5;
          if(mx>=c.last && r) { e.preventDefault();e.stopPropagation();switchTo(c.nM,c.nP); }
          else if(mn<=1 && !r) { e.preventDefault();e.stopPropagation();switchTo(c.nM,c.pP); }
        } catch(ex){}
      };
      w.document.addEventListener('mousedown', h, {capture:true});
      w.document.addEventListener('touchstart', h, {capture:true, passive:false});
      console.log('✅', c.fid);
    })();
  });
}

// 轮询兜底
function startPoll() {
  var stuck = 0;
  setInterval(function(){
    if(busy) { stuck=0; return; }
    try {
      var w = currentMode===MODE_A ? getWin('iframe-donald') : getWin('iframe-kenya');
      if(!w||!w.BookInfo) return;
      var p = w.BookInfo.getCurrentPages();
      if(!p||!p.length) return;
      var mx=Math.max.apply(null,p), mn=Math.min.apply(null,p);
      var atB = currentMode===MODE_A ? (mx>=A_LAST||mn<=1) : (mx>=B_LAST||mn<=1);
      if(atB) {
        if(!stuck) stuck=Date.now();
        else if(Date.now()-stuck>3000 && !busy) {
          stuck=0;
          if(currentMode===MODE_A) switchTo(MODE_B, mx>=A_LAST?B_FIRST:B_LAST);
          else switchTo(MODE_A, mx>=B_LAST?1:A_LAST);
        }
      } else stuck=0;
    } catch(e){}
  },1000);
}

// 启动
var r={a:false,b:false};
var t = setInterval(function(){
  var dw = getWin('iframe-donald'), kw = getWin('iframe-kenya');
  if(dw && dw.waitForLoading===false) r.a=true;
  if(kw && kw.waitForLoading===false) r.b=true;
  if(r.a && r.b) {
    clearInterval(t);
    document.getElementById('load').classList.add('hide');
    setTimeout(function(){install();startPoll();console.log('✅ 启动');},600);
  }
},200);

setTimeout(function(){
  var el=document.getElementById('load');
  if(el&&!el.classList.contains('hide')){el.classList.add('hide');setTimeout(function(){install();startPoll();},600);}
},12000);
</script>
</body>
</html>
