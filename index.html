<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=3.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>显隐之间 · 设计的设计</title>
<link rel="stylesheet" href="./css/style.css">
<link rel="stylesheet" href="./css/player.css">
<link rel="stylesheet" href="./css/phoneTemplate.css">
<link rel="stylesheet" href="./css/template.css">
<style>
html,body{width:100%;height:100%;overflow:hidden;background:#e8ddd0;margin:0;padding:0;position:fixed;top:0;left:0}
#load{position:fixed;inset:0;z-index:99999;display:flex;flex-direction:column;align-items:center;justify-content:center;background:#1a1a1a;color:#fff;transition:opacity 1s,visibility 1s}
#load.hide{opacity:0;visibility:hidden;pointer-events:none}
.ph{width:52px;height:88px;border:2.5px solid rgba(255,255,255,.55);border-radius:9px;position:relative;margin-bottom:22px;animation:rotP 2.6s ease-in-out infinite}
.ph::after{content:'';position:absolute;top:4px;left:4px;right:4px;bottom:14px;background:linear-gradient(135deg,#333,#555);border-radius:3px}
.ph::before{content:'';position:absolute;bottom:3px;left:50%;transform:translateX(-50%);width:12px;height:3px;border:1.5px solid rgba(255,255,255,.35);border-radius:2px}
@keyframes rotP{0%{transform:rotate(0)}50%{transform:rotate(90deg)}70%{transform:rotate(90deg)}100%{transform:rotate(90deg)}}
.lt{font-size:14px;color:rgba(255,255,255,.55);letter-spacing:4px;animation:fp 1.5s infinite}
@keyframes fp{0%,100%{opacity:.35}50%{opacity:1}}
#hint{position:fixed;bottom:18px;left:0;right:0;z-index:10;text-align:center;font-size:12px;color:rgba(255,255,255,0.35);letter-spacing:3px;pointer-events:none;text-shadow:0 1px 4px rgba(0,0,0,0.2)}
.side-content{transition:background-color 1s ease!important}
/* 确保书容器填满移动端 */
.bookContainer,.tmpContainer{width:100%!important;height:100%!important}
</style>
</head>
<body>
<div id="load"><div class="ph"></div><div class="lt">请横屏观看</div></div>
<div id="hint">双指放大 · 点击翻阅</div>
<script src="./js/jquery.js"></script>
<script src="./js/config.js"></script>
<script src="./js/main.js"></script>
<script src="./js/bookImgData.js"></script>
<script src="./js/check.js"></script>
<script src="./js/LoadingJS.js"></script>
<script>
var A_LAST=13,B_LAST=29,lock=false,lastSec=-1,COL_A='#e8ddd0',COL_B='#6a6a6a';

function setBg(c){
  document.body.style.backgroundColor=c;
  document.documentElement.style.backgroundColor=c;
  var s=document.querySelectorAll('.side-content');
  for(var i=0;i<s.length;i++)s[i].style.backgroundColor=c;
}

function theme(p){if(!lock)setBg(p<=A_LAST?COL_A:COL_B);}
function jump(to){lock=true;try{BookInfo.getBook().gotoPage(to)}catch(e){}setTimeout(function(){lock=false},400);}

// 边界拦截
(function(){
  var fn=function(e){
    if(lock||typeof BookInfo==='undefined')return;
    try{
      var p=BookInfo.getCurrentPages();if(!p||!p.length)return;
      var mx=Math.max.apply(null,p),mn=Math.min.apply(null,p);
      var x=e.clientX;if(x===void 0&&e.touches)x=e.touches[0].clientX;if(x===void 0)return;
      var r=x>(window.innerWidth||document.documentElement.clientWidth)*0.5;
      if(mx>=B_LAST&&r){e.preventDefault();e.stopPropagation();jump(1);}
      else if(mn<=1&&!r){e.preventDefault();e.stopPropagation();jump(B_LAST);}
    }catch(ex){}
  };
  document.addEventListener('mousedown',fn,{capture:true});
  document.addEventListener('touchstart',fn,{capture:true,passive:false});
})();

// 轮询
setInterval(function(){
  if(typeof BookInfo==='undefined')return;
  try{
    var p=BookInfo.getCurrentPages();if(!p||!p.length)return;
    var mx=Math.max.apply(null,p),sec=mx<=A_LAST?0:1;
    if(sec!==lastSec){lastSec=sec;theme(mx);}
    if(sec===1){
      var sides=document.querySelectorAll('.side-content');
      for(var i=0;i<sides.length;i++){var c=sides[i].style.backgroundColor;if(c&&c!=='rgb(106,106,106)'&&c!=='#6a6a6a')sides[i].style.backgroundColor=COL_B;}
    }
  }catch(e){}
},300);

// 启动
var chk=setInterval(function(){
  if(!window.waitForLoading){
    clearInterval(chk);
    document.getElementById('load').classList.add('hide');
    theme(1);
    console.log('OK');
  }
},200);
setTimeout(function(){var el=document.getElementById('load');if(el&&!el.classList.contains('hide')){el.classList.add('hide');theme(1);}},10000);
</script>
</body>
</html>
